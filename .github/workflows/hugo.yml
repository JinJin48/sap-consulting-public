name: "[DISABLED] Deploy Hugo site to Pages"

# Phase I-2 (2026-04-27) で Cloudflare Workers に移行したため無効化。
# - GitHub Pages は当面残すが、自動デプロイは停止。
# - 手動実行 (workflow_dispatch) のみ可能(緊急ロールバック用)。
# - 完全削除は Cloudflare Workers での運用が安定してから実施予定。

on:
  # push トリガー無効化
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.160.1
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.13'
          cache: 'npm'

      - name: Install npm dependencies (project root)
        run: npm ci --no-audit --no-fund

      - name: Pre-warm hugo_stats.json (themes/doks)
        run: |
          mkdir -p themes/doks
          echo '{"htmlElements":{"tags":[],"classes":[],"ids":[]}}' > themes/doks/hugo_stats.json
          echo '{"htmlElements":{"tags":[],"classes":[],"ids":[]}}' > hugo_stats.json

      - name: Build with Hugo (1st pass — generate hugo_stats.json)
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: development
        run: hugo --gc --baseURL "${{ steps.pages.outputs.base_url }}/" || true

      - name: Sync hugo_stats.json to themes/doks (for postcss.config.js)
        run: |
          if [ -f hugo_stats.json ]; then
            cp hugo_stats.json themes/doks/hugo_stats.json
            echo "=== hugo_stats.json content (first 500 chars) ==="
            head -c 500 hugo_stats.json
            echo ""
            echo "=== file size ==="
            wc -c hugo_stats.json
          else
            echo "WARNING: hugo_stats.json not generated by 1st pass"
          fi

      - name: Build with Hugo (2nd pass — production)
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
